// ─── Trip Config ──────────────────────────────────────────────────────────────
const TRIP_START = new Date(2026, 10, 3)  // Nov 3, 2026
const TRIP_DAYS  = 17
const DAYS_ARRAY   = Array.from({ length: TRIP_DAYS }, (_, i) => i + 1)
const DAYS_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']

function dayToDate(day) {
  const d = new Date(TRIP_START)
  d.setDate(d.getDate() + day - 1)
  return d
}
function formatDayLabel(day) {
  const d = dayToDate(day)
  return `${DAYS_SHORT[d.getDay()]} ${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}`
}
function dateToDayNum(dateStr) {
  try {
    const d = new Date(dateStr)
    if (isNaN(d)) return null
    const diff = Math.floor((d - TRIP_START) / 86400000)
    const day = diff + 1
    return (day >= 1 && day <= TRIP_DAYS) ? day : null
  } catch { return null }
}

// ─── ID Generators ────────────────────────────────────────────────────────────
function genPlanId() {
  return `plan_${Date.now()}_${Math.random().toString(36).slice(2,7)}`
}
function genLocId(name, lat, lng) {
  const slug = String(name).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,30)
  const latStr = String(lat).replace('.','').slice(0,10)
  const lngStr = String(lng).replace('.','').slice(0,10)
  return `${slug}--${latStr}-${lngStr}`.slice(0,60)
}

// ─── Setup Modal ──────────────────────────────────────────────────────────────
function SetupModal({ onClose, onAfterSave }) {
  const [url,      setUrl]      = useState(() => localStorage.getItem('builderNetlifyUrl') || '')
  const [mapsKey,  setMapsKey]  = useState(() => localStorage.getItem('builderMapsKey')    || '')
  const [ghToken,  setGhToken]  = useState(() => localStorage.getItem('builderGhToken')    || '')
  const [ghRepo,   setGhRepo]   = useState(() => localStorage.getItem('builderGhRepo')     || '')
  const [ghBranch, setGhBranch] = useState(() => localStorage.getItem('builderGhBranch')   || 'main')
  const [syncRepo, setSyncRepo] = useState(() => localStorage.getItem('builderSyncRepo')   || 'Nirco-Cloud/trip-data')

  function save() {
    localStorage.setItem('builderNetlifyUrl', url.trim())
    localStorage.setItem('builderMapsKey',    mapsKey.trim())
    localStorage.setItem('builderGhToken',    ghToken.trim())
    localStorage.setItem('builderGhRepo',     ghRepo.trim())
    localStorage.setItem('builderGhBranch',   ghBranch.trim() || 'main')
    localStorage.setItem('builderSyncRepo',   syncRepo.trim())
    onAfterSave?.()
    onClose()
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="bg-white rounded-2xl shadow-2xl p-6 w-[520px] max-w-[90vw]">

          Google Maps API Key
          <span className="text-slate-400 font-normal ml-1 text-xs">— for the map view</span>
        </label>
        <input
          type="text"
          value={mapsKey}
          onChange={e => setMapsKey(e.target.value)}
          placeholder="AIza..."
          className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 mb-1 font-mono"
        />
        <p className="text-xs text-slate-400 mb-4">
          Use a separate <code>builder-local</code> key (unrestricted, Maps JavaScript API only).
          Stored in <code>localStorage</code> only — never committed to git.
        </p>

        <label className="block text-sm font-medium text-slate-700 mb-1">
          Netlify Resolver URL
          <span className="text-slate-400 font-normal ml-1 text-xs">— for Google Maps link resolution</span>
        </label>
        <input
          type="url"
          value={url}
          onChange={e => setUrl(e.target.value)}
          placeholder="https://your-site.netlify.app/.netlify/functions/resolve-maps-link"
          className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 mb-1"
        />
        <p className="text-xs text-slate-400 mb-5">
          Same as <code>VITE_NETLIFY_RESOLVER_URL</code> in the mobile app's .env. Leave blank to skip Maps link resolution.
        </p>

        <div className="border-t border-slate-100 pt-4 mb-1">
          <p className="text-sm font-semibold text-slate-700 mb-3">GitHub Push — auto-commit on Save</p>

          <label className="block text-sm font-medium text-slate-700 mb-1">
            Personal Access Token
            <span className="text-slate-400 font-normal ml-1 text-xs">— needs <code>contents: write</code></span>
          </label>
          <input
            type="password"
            value={ghToken}
            onChange={e => setGhToken(e.target.value)}
            placeholder="ghp_..."
            className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 mb-3 font-mono"
          />

          <div className="flex gap-2 mb-4">
            <div className="flex-1">
              <label className="block text-xs font-medium text-slate-700 mb-1">Repository</label>
              <input
                type="text"

                onChange={e => setGhRepo(e.target.value)}

                className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 font-mono"
              />
            </div>
            <div className="w-28">

// ─── Days Sidebar ─────────────────────────────────────────────────────────────

      <div className="flex border-b border-slate-200 shrink-0">
        {[
          { id: 'plan',      label: `📅 Plan (${planEntries.filter(e => !e.deletedAt).length})` },
          { id: 'locations', label: `📍 Locations (${locCount})` },
        ].map(tab => (
          <button
            key={tab.id}
            onClick={() => onTabChange(tab.id)}
            className={`flex-1 py-3 text-sm font-semibold transition-colors ${
              mainTab === tab.id
                ? 'text-sky-600 border-b-2 border-sky-500 bg-white'
                : 'text-slate-500 hover:text-slate-700'
            }`}
          >
            {tab.label}
          </button>
        ))}
      </div>

      {/* Day list — always visible */}
      <div className="flex-1 overflow-y-auto">
        {DAYS_ARRAY.map(day => {
          const dayEntries = planEntries.filter(e => e.day === day && !e.deletedAt)
          const count = dayEntries.length
          const types = [...new Set(dayEntries.map(e => e.type))]
          const d = dayToDate(day)

          return (
            <button
              key={day}
              onClick={() => onDaySelect(day)}
              className={`w-full flex items-center gap-2 px-3 py-3 text-left border-b border-slate-100 hover:bg-white transition-colors ${
                activeDay === day ? 'bg-white border-l-2 border-l-sky-500 pl-2.5' : ''
              }`}
            >
              <span className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${
                activeDay === day ? 'bg-sky-500 text-white' : 'bg-slate-200 text-slate-600'
              }`}>
                {day}
              </span>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold text-slate-700 truncate">
                  {DAYS_SHORT[d.getDay()]} {d.getDate()} {MONTHS_SHORT[d.getMonth()]}
                </p>
                <p className={`text-xs ${count > 0 ? 'text-slate-400' : 'text-slate-300'}`}>
                  {count > 0 ? `${count} entr${count === 1 ? 'y' : 'ies'}` : 'empty'}

              </div>
              <div className="flex gap-0.5 shrink-0">
                {types.slice(0,3).map(t => (

                ))}

          )
        })}
      </div>
    </aside>
  )
}

function EntryEditPanel({ entry, isNew, onSave, onCancel, onDelete }) {
  const [form, setForm] = useState(() => ({
    type:    entry.type  || 'location',
    name:    entry.name  || '',
    day:     entry.day   || 1,
    order:   entry.order ?? 0,
    lat:     entry.lat   != null ? entry.lat  : '',
    lng:     entry.lng   != null ? entry.lng  : '',
    note:    entry.note  || '',
    owner:   entry.owner || 'shared',
    meta:    { ...(entry.meta || {}) },
  }))

  const typeDef = ENTRY_TYPES[form.type] || ENTRY_TYPES.location

  // Reset meta when type changes
  function setType(t) { setForm(f => ({ ...f, type: t, meta: {} })) }
  function setMeta(key, val) { setForm(f => ({ ...f, meta: { ...f.meta, [key]: val } })) }

  function handleSave() {
    const now = new Date().toISOString()
    const saved = {
      ...entry,
      ...form,
      lat:  form.lat !== '' && form.lat !== null ? parseFloat(form.lat)  : null,
      lng:  form.lng !== '' && form.lng !== null ? parseFloat(form.lng)  : null,
      meta: typeDef.metaFields.length > 0 ? form.meta : null,
      updatedAt:  now,
      createdAt:  entry.createdAt || now,
      deletedAt:  null,
    }
    if (isNew) saved.id = genPlanId()
    onSave(saved)
  }

  return (
    <div className="bg-white rounded-xl border border-sky-200 ring-1 ring-sky-100 p-4">
      <div className="flex items-center justify-between mb-3">
        <h3 className="text-sm font-semibold text-slate-700">{isNew ? '+ New Entry' : 'Edit Entry'}</h3>
        <button onClick={onCancel} className="text-slate-400 hover:text-slate-600 text-lg leading-none">×</button>
      </div>

      {/* Type picker */}
      <div className="mb-3">
        <p className="text-xs font-medium text-slate-500 mb-1.5">Type</p>
        <div className="flex flex-wrap gap-1.5">
          {Object.entries(ENTRY_TYPES).map(([key, def]) => (
            <button
              key={key}
              onClick={() => setType(key)}
              className="px-2.5 py-1 rounded-full text-xs font-semibold border transition-all"
              style={
                form.type === key
                  ? { backgroundColor: def.color, color: '#fff', borderColor: def.color }
                  : { backgroundColor: def.color + '15', color: def.color, borderColor: def.color + '50' }
              }
            >
              {def.label}
            </button>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-2 gap-2 mb-2">
        <InputField label="Name" value={form.name} onChange={v => setForm(f => ({...f, name: v}))} className="col-span-2" />

        {/* Day */}
        <div>
          <label className="block text-xs font-medium text-slate-500 mb-1">Day</label>
          <select
            value={form.day}
            onChange={e => setForm(f => ({...f, day: parseInt(e.target.value)}))}
            className="w-full px-2.5 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 bg-white"
          >
            {DAYS_ARRAY.map(d => (
              <option key={d} value={d}>Day {d} — {formatDayLabel(d)}</option>
            ))}
          </select>
        </div>

        {/* Owner */}
        <div>
          <label className="block text-xs font-medium text-slate-500 mb-1">Owner</label>
          <select
            value={form.owner}
            onChange={e => setForm(f => ({...f, owner: e.target.value}))}
            className="w-full px-2.5 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 bg-white"
          >
            <option value="shared">Shared</option>
            <option value="nirco">Nirco (private)</option>
            <option value="bar">Bar</option>
          </select>
        </div>

        <InputField label="Latitude"  value={form.lat} onChange={v => setForm(f => ({...f, lat: v}))} type="number" placeholder="35.6762" />
        <InputField label="Longitude" value={form.lng} onChange={v => setForm(f => ({...f, lng: v}))} type="number" placeholder="139.6503" />

        <div className="col-span-2">
          <label className="block text-xs font-medium text-slate-500 mb-1">Order</label>
          <input
            type="number" min="0"
            value={form.order}
            onChange={e => setForm(f => ({...f, order: parseInt(e.target.value) || 0}))}
            className="w-24 px-2.5 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 bg-white"
          />
        </div>
      </div>

      {/* Note */}
      <div className="mb-3">
        <label className="block text-xs font-medium text-slate-500 mb-1">Note</label>
        <textarea
          value={form.note}
          onChange={e => setForm(f => ({...f, note: e.target.value}))}
          rows={2}
          className="w-full px-2.5 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 resize-none"
        />
      </div>

      {/* Meta fields */}
      {typeDef.metaFields.length > 0 && (
        <div className="mb-3">
          <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">
            {typeDef.label} Details
          </p>
          <div className="grid grid-cols-2 gap-2">
            {typeDef.metaFields.map(field => (
              <InputField
                key={field.key}
                label={field.label}
                type={field.type}
                value={form.meta[field.key] || ''}
                onChange={v => setMeta(field.key, v)}
                className={field.key === 'roomType' || field.key === 'pickupLocation' || field.key === 'dropoffLocation' ? 'col-span-2' : ''}
              />
            ))}
          </div>
        </div>
      )}

      {/* Actions */}
      <div className="flex gap-2 pt-1 border-t border-slate-100 mt-3">
        <button
          onClick={handleSave}
          className="px-4 py-1.5 text-sm font-semibold bg-sky-500 text-white rounded-lg hover:bg-sky-600 transition-colors"
        >
          {isNew ? 'Add Entry' : 'Save Changes'}
        </button>
        <button onClick={onCancel} className="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-700 transition-colors">
          Cancel
        </button>
        {!isNew && (
          <button
            onClick={onDelete}
            className="ml-auto px-3 py-1.5 text-sm text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"
          >
            Delete
          </button>
        )}
      </div>
    </div>
  )
}

        >

        >
          Delete
        </button>
      </div>
    </div>
  )
}

// ─── Day Editor ───────────────────────────────────────────────────────────────
function DayEditor({ day, planEntries, preFillEntry, onClearPreFill, onUpdateEntries, onSetDirty, onFocusEntry }) {
  const [editingEntry, setEditingEntry] = useState(null)  // null | entry | { _new: true }
  const dragSrcRef = useRef(null)

  // Auto-open pre-fill from tools panel
  useEffect(() => {
    if (preFillEntry) {
      setEditingEntry(preFillEntry)
      onClearPreFill()
    }
  }, [preFillEntry])

  const dayEntries = planEntries
    .filter(e => e.day === day && !e.deletedAt)
    .sort((a, b) => (a.order ?? 0) - (b.order ?? 0))

  function handleNewEntry() {
    setEditingEntry({ day, type: 'location', name: '', order: dayEntries.length, owner: 'shared' })
  }

  function handleSaveEntry(saved) {
    const idx = planEntries.findIndex(e => e.id === saved.id)
    const updated = idx >= 0
      ? planEntries.map(e => e.id === saved.id ? saved : e)
      : [...planEntries, saved]
    onUpdateEntries(updated)
    setEditingEntry(null)
    onSetDirty()
  }

  function handleDeleteEntry(id) {
    if (!confirm('Soft-delete this entry? It will be hidden but kept in the file.')) return
    const now = new Date().toISOString()
    const updated = planEntries.map(e =>
      e.id === id ? { ...e, deletedAt: now, updatedAt: now } : e
    )
    onUpdateEntries(updated)
    setEditingEntry(null)
    onSetDirty()
  }

  // HTML5 drag-to-reorder
  function handleDragStart(entry) { dragSrcRef.current = entry }

  function handleDrop(e, targetEntry) {
    e.currentTarget.classList.remove('drag-over-top')
    const src = dragSrcRef.current
    if (!src || src.id === targetEntry.id) return
    const now = new Date().toISOString()
    const srcOrd = src.order ?? 0
    const tgtOrd = targetEntry.order ?? 0
    const updated = planEntries.map(e => {
      if (e.id === src.id)         return { ...e, order: tgtOrd, updatedAt: now }
      if (e.id === targetEntry.id) return { ...e, order: srcOrd, updatedAt: now }
      return e
    })
    onUpdateEntries(updated)
    dragSrcRef.current = null
    onSetDirty()
  }

  const isNewForm = editingEntry && !editingEntry.id

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      {/* Day header */}
      <div className="flex items-center gap-3 px-5 py-4 border-b border-slate-100 shrink-0 bg-white">
        <div className="w-12 h-12 rounded-full bg-sky-500 text-white flex items-center justify-center font-bold text-lg shrink-0">
          {day}
        </div>
        <div>
          <p className="text-xl font-bold text-slate-800">Day {day}</p>
          <p className="text-base text-slate-400">{formatDayLabel(day)}</p>
        </div>
        <span className="ml-auto text-base text-slate-400">
          {dayEntries.length} {dayEntries.length === 1 ? 'entry' : 'entries'}
        </span>
        <button
          onClick={handleNewEntry}
          className="px-4 py-2.5 text-base font-semibold text-sky-600 border border-sky-200 rounded-lg hover:bg-sky-50 transition-colors"
        >
          + Add Entry
        </button>
      </div>

      {/* Entries */}
      <div className="flex-1 overflow-y-auto p-4 space-y-2">
        {dayEntries.length === 0 && !isNewForm && (
          <div className="flex flex-col items-center gap-3 py-12 text-slate-400">
            <p className="text-sm">No entries for Day {day}</p>
            <button
              onClick={handleNewEntry}
              className="px-4 py-2 text-sm font-medium text-sky-600 border border-dashed border-sky-300 rounded-xl hover:bg-sky-50 transition-colors"
            >
              + Add first entry
            </button>
          </div>
        )}

        {dayEntries.map((entry, idx) => (
          <div key={entry.id}>
            <EntryRow
              entry={entry}
              index={idx}
              isEditing={editingEntry?.id === entry.id}
              onFocus={() => onFocusEntry?.(entry)}
              onEdit={() => setEditingEntry(entry)}
              onDelete={() => handleDeleteEntry(entry.id)}
              onDragStart={() => handleDragStart(entry)}
              onDragOver={e => e.currentTarget.classList.add('drag-over-top')}
              onDragLeave={e => e.currentTarget.classList.remove('drag-over-top')}
              onDrop={e => handleDrop(e, entry)}
            />
            {editingEntry?.id === entry.id && (
              <div className="mt-2">
                <EntryEditPanel
                  entry={editingEntry}
                  isNew={false}
                  onSave={handleSaveEntry}
                  onCancel={() => setEditingEntry(null)}
                  onDelete={() => handleDeleteEntry(entry.id)}
                />
              </div>
            )}
          </div>
        ))}

        {/* New entry form */}
        {isNewForm && (
          <EntryEditPanel
            entry={editingEntry}
            isNew={true}
            onSave={handleSaveEntry}
            onCancel={() => setEditingEntry(null)}
            onDelete={() => {}}
          />
        )}
      </div>
    </div>
  )
}

// ─── Location Edit Panel ──────────────────────────────────────────────────────
function LocationEditPanel({ location, isNew, onSave, onCancel, onDelete, onAddBoth }) {
  const [form, setForm] = useState(() => ({
    name:        location.name        || '',
    latitude:    location.latitude    != null ? location.latitude  : '',
    longitude:   location.longitude   != null ? location.longitude : '',
    category:    location.category    || 'location',
    description: location.description || '',
    address:     location.address     || '',
    phone:       location.phone       || '',
    website:     location.website     || '',
    rating:      location.rating      != null ? location.rating : '',
    notes:       location.notes       || '',
  }))
  const [selectedDay, setSelectedDay] = useState(null)
  const [showDayGrid, setShowDayGrid] = useState(false)
  const [saveError, setSaveError] = useState('')

  function handleSave() {
    if (!form.name.trim()) { setSaveError('Name is required.'); return }
    if (form.latitude === '' || form.longitude === '') { setSaveError('Latitude and Longitude are required. Enter them manually or resolve a full Maps link.'); return }
    const lat = parseFloat(form.latitude)
    const lng = parseFloat(form.longitude)
    if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
      setSaveError('Coordinates out of valid range (lat: −90 to 90, lng: −180 to 180).')
      return
    }
    if (lat === 0 && lng === 0) {
      if (!confirm('Coordinates (0, 0) point to the ocean off West Africa — are you sure these are correct?')) return
    }
    setSaveError('')
    const now = new Date().toISOString()
    const saved = {
      ...location,
      ...form,
      latitude:  form.latitude  !== '' ? parseFloat(form.latitude)  : null,
      longitude: form.longitude !== '' ? parseFloat(form.longitude) : null,
      created_at: location.created_at || now,
      source:     location.source || 'builder',
      images:     location.images || [],
      icon:       location.icon   || '',
    }
    if (isNew) saved.id = genLocId(form.name, form.latitude || 0, form.longitude || 0)
    if (isNew && selectedDay && onAddBoth) {
      onAddBoth(saved, selectedDay)
    } else {
      onSave(saved)
    }
  }

  return (
    <div className="bg-white rounded-xl border border-sky-200 ring-1 ring-sky-100 p-4">
      <div className="flex items-center justify-between mb-3">
        <h3 className="text-sm font-semibold text-slate-700">{isNew ? '+ New Location' : 'Edit Location'}</h3>
        <button onClick={onCancel} className="text-slate-400 hover:text-slate-600 text-lg leading-none">×</button>
      </div>

      <div className="space-y-2">
        <InputField label="Name" value={form.name} onChange={v => setForm(f => ({...f, name: v}))} />

        <div className="grid grid-cols-2 gap-2">
          <InputField label="Latitude"  value={form.latitude}  onChange={v => setForm(f => ({...f, latitude:  v}))} type="number" placeholder="35.6762" />
          <InputField label="Longitude" value={form.longitude} onChange={v => setForm(f => ({...f, longitude: v}))} type="number" placeholder="139.6503" />
        </div>

        {/* Category + Day picker on the same row */}
        <div className={`grid gap-2 ${isNew ? 'grid-cols-2' : 'grid-cols-1'}`}>
          <div>
            <label className="block text-xs font-medium text-slate-500 mb-1">Category</label>
            <select
              value={form.category}
              onChange={e => setForm(f => ({...f, category: e.target.value}))}
              className="w-full px-2.5 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 bg-white"
            >
              {CATEGORIES.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
            </select>
          </div>

          {isNew && (
            <div>
              <label className="block text-xs font-medium text-slate-500 mb-1">Also add to day</label>
              {selectedDay ? (
                <div className="flex items-center gap-1.5">
                  <button
                    onClick={() => setShowDayGrid(g => !g)}
                    className="flex-1 flex items-center gap-1 px-2 py-1.5 text-xs font-semibold bg-indigo-100 text-indigo-700 border border-indigo-300 rounded-lg hover:bg-indigo-200 transition-colors truncate"
                  >
                    📅 D{selectedDay} · {formatDayLabel(selectedDay)}
                  </button>
                  <button
                    onClick={() => { setSelectedDay(null); setShowDayGrid(false) }}
                    className="text-slate-400 hover:text-red-400 text-base leading-none shrink-0 transition-colors"
                    title="Clear"
                  >✕</button>
                </div>
              ) : (
                <button
                  onClick={() => setShowDayGrid(g => !g)}
                  className="w-full px-2.5 py-1.5 text-xs text-slate-400 border border-dashed border-slate-300 rounded-lg hover:border-indigo-400 hover:text-indigo-600 transition-colors text-left"
                >
                  📅 Add to Day…
                </button>
              )}
            </div>
          )}
        </div>

        {/* Inline day grid */}
        {isNew && showDayGrid && (
          <div className="bg-slate-50 border border-slate-200 rounded-xl p-2 grid grid-cols-7 gap-1">
            {DAYS_ARRAY.map(d => {
              const date = dayToDate(d)
              const isSel = selectedDay === d
              return (
                <button
                  key={d}
                  onClick={() => { setSelectedDay(d); setShowDayGrid(false) }}
                  className={`flex flex-col items-center rounded-lg py-1.5 px-0.5 text-center transition-colors ${
                    isSel ? 'bg-indigo-500 text-white' : 'hover:bg-indigo-50 text-slate-600'
                  }`}
                >
                  <span className="text-[9px] font-medium opacity-70">{DAYS_SHORT[date.getDay()]}</span>
                  <span className="text-sm font-bold leading-tight">{date.getDate()}</span>
                  <span className="text-[9px] opacity-60">{MONTHS_SHORT[date.getMonth()]}</span>
                  <span className="text-[9px] font-semibold opacity-50">D{d}</span>
                </button>
              )
            })}
          </div>
        )}

        <div>
          <label className="block text-xs font-medium text-slate-500 mb-1">Description</label>
          <textarea
            value={form.description}
            onChange={e => setForm(f => ({...f, description: e.target.value}))}
            rows={3}
            className="w-full px-2.5 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 resize-none"
          />
        </div>

        <InputField label="Address" value={form.address} onChange={v => setForm(f => ({...f, address: v}))} placeholder="580 Nakanochō, Kyoto…" />

        <div className="grid grid-cols-2 gap-2">
          <InputField label="Phone" value={form.phone} onChange={v => setForm(f => ({...f, phone: v}))} placeholder="+81 75-255-0181" />
          <InputField label="Rating" value={form.rating} onChange={v => setForm(f => ({...f, rating: v}))} type="number" placeholder="4.2" />
        </div>

        <InputField label="Website" value={form.website} onChange={v => setForm(f => ({...f, website: v}))} placeholder="https://…" />

        {location.openingHours?.length > 0 && (
          <div>
            <label className="block text-xs font-medium text-slate-500 mb-1">🕐 Opening Hours</label>
            <ul className="text-xs text-slate-500 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 space-y-0.5">
              {location.openingHours.map((h, i) => <li key={i}>{h}</li>)}
            </ul>
          </div>
        )}

        <div>
          <label className="block text-xs font-medium text-amber-600 mb-1">✍️ Personal Notes / הערות אישיות</label>
          <textarea
            value={form.notes}
            onChange={e => setForm(f => ({...f, notes: e.target.value}))}
            dir="auto"
            rows={4}
            placeholder="הוסף הערות אישיות... searchable in the mobile app"
            className="w-full px-2.5 py-1.5 text-sm border border-amber-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none bg-amber-50 placeholder:text-amber-300"
          />
        </div>
      </div>

      {saveError && (
        <p className="text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg px-2.5 py-2 mt-1">{saveError}</p>
      )}

      <div className="flex gap-2 pt-3 border-t border-slate-100 mt-3">
        <button
          onClick={handleSave}
          className={`px-4 py-1.5 text-sm font-semibold text-white rounded-lg transition-colors ${
            isNew && selectedDay ? 'bg-indigo-500 hover:bg-indigo-600' : 'bg-sky-500 hover:bg-sky-600'
          }`}
        >
          {isNew
            ? selectedDay ? `Add Location + Plan Day ${selectedDay}` : 'Add Location'
            : 'Save Changes'}
        </button>
        <button onClick={onCancel} className="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-700 transition-colors">
          Cancel
        </button>
        {!isNew && (
          <button onClick={onDelete} className="ml-auto px-3 py-1.5 text-sm text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors">
            Delete
          </button>
        )}
      </div>
    </div>
  )
}

              const count = planEntries.filter(e => e.day === day && !e.deletedAt).length
              return (
                <button
                  key={day}
                  onClick={() => handleSelectDay(day)}
                  disabled={!!toast}
                  className="relative flex flex-col items-center justify-center rounded-2xl py-4 px-2 border-2 border-slate-200 bg-slate-50 hover:border-sky-400 hover:bg-sky-50 hover:text-sky-700 active:scale-95 transition-all select-none group"

                  <span className="text-sm font-semibold text-slate-500 group-hover:text-sky-600 mt-1">{DAYS_SHORT[date.getDay()]} {date.getDate()}</span>
                  <span className="text-xs text-slate-400 group-hover:text-sky-500">{MONTHS_SHORT[date.getMonth()]}</span>
                  {count > 0 && (
                    <span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-emerald-400" />
                  )}
                </button>
              )
            })}
          </div>
        </div>

        {/* Cancel */}
        <div className="px-6 pt-3 pb-5 border-t border-slate-100 mt-3">
          <button
            onClick={onClose}
            className="w-full py-3 text-sm font-semibold text-slate-500 rounded-2xl bg-slate-100 hover:bg-slate-200 transition-colors"
          >
            Cancel
          </button>
        </div>
      </div>
    </>
  )
}

// ─── Map View ─────────────────────────────────────────────────────────────────
function MapView({ locations, planEntries, activeDay, mapsReady, focusCoords, onRequestDayPicker, onOpenEditor }) {
  const mapDivRef           = useRef(null)
  const mapRef              = useRef(null)
  const markersRef          = useRef([])
  const markerByIdRef        = useRef({})   // locationId → marker
  const highlightedMarkerRef = useRef(null) // currently highlighted icon marker
  const highlightRingRef     = useRef(null) // white badge ring behind highlighted icon
  const [selectedLoc, setSelectedLoc] = useState(null)

  // Init map once Maps JS is ready
  useEffect(() => {
    if (!mapsReady || !mapDivRef.current || mapRef.current) return
    mapRef.current = new google.maps.Map(mapDivRef.current, {
      center: { lat: 35.6762, lng: 139.6503 },
      zoom: 11,
      disableDefaultUI: true,
      gestureHandling: 'greedy',
    })
  }, [mapsReady])

  // Pan + zoom + highlight marker for focused entry
  useEffect(() => {
    if (!mapRef.current || !focusCoords) return
    mapRef.current.panTo({ lat: focusCoords.lat, lng: focusCoords.lng })
    mapRef.current.setZoom(16)

    // Remove previous highlight ring
    if (highlightRingRef.current) { highlightRingRef.current.setMap(null); highlightRingRef.current = null }
    // Restore previous icon marker z-index
    if (highlightedMarkerRef.current) { highlightedMarkerRef.current.setZIndex(null); highlightedMarkerRef.current = null }

    const marker = focusCoords.locationId ? markerByIdRef.current[focusCoords.locationId] : null
    if (marker) {
      // Sky-blue glow ring behind the icon — transparent fill, colored border
      const ring = new google.maps.Marker({
        position: marker.getPosition(),
        map: mapRef.current,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 30,
          fillColor: '#0ea5e9',
          fillOpacity: 0.18,
          strokeColor: '#0ea5e9',
          strokeWeight: 2.5,
        },
        zIndex: 97,
        clickable: false,
      })
      highlightRingRef.current = ring
      marker.setZIndex(99)
      highlightedMarkerRef.current = marker
    }
  }, [focusCoords])

  // Redraw markers whenever data changes
  useEffect(() => {
    if (!mapRef.current) return
    markersRef.current.forEach(m => m.setMap(null))
    markersRef.current = []
    markerByIdRef.current = {}
    highlightedMarkerRef.current = null
    if (highlightRingRef.current) { highlightRingRef.current.setMap(null); highlightRingRef.current = null }

    // Location markers — category SVG icons (same as mobile app)
    locations.forEach(loc => {
      if (!loc.latitude || !loc.longitude) return
      const marker = new google.maps.Marker({
        position: { lat: loc.latitude, lng: loc.longitude },
        map: mapRef.current,
        title: loc.name,
        icon: {
          url: getCatIconUrl(loc.category),
          scaledSize: new google.maps.Size(28, 28),
          anchor: new google.maps.Point(14, 14),
        },
      })
      marker.addListener('click', () => { setSelectedLoc(loc) })
      markersRef.current.push(marker)
      markerByIdRef.current[loc.id] = marker
    })

    // Active day entries — numbered blue circles
    planEntries
      .filter(e => e.day === activeDay && !e.deletedAt && e.lat && e.lng)
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0))
      .forEach((entry, i) => {
        const marker = new google.maps.Marker({
          position: { lat: entry.lat, lng: entry.lng },
          map: mapRef.current,
          title: entry.name,
          label: { text: String(i + 1), color: '#fff', fontWeight: 'bold', fontSize: '11px' },
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 12,
            fillColor: '#0ea5e9',
            fillOpacity: 1,
            strokeColor: '#ffffff',
            strokeWeight: 2,
          },
          zIndex: 100,
        })
        markersRef.current.push(marker)
      })
  }, [locations, planEntries, activeDay, mapsReady])

  // No key configured
  if (!localStorage.getItem('builderMapsKey')) {
    return (
      <div className="flex-1 flex flex-col items-center justify-center gap-4 text-slate-400 px-8">
        <span className="text-5xl">🗺</span>
        <p className="text-base font-semibold text-slate-600">Google Maps not configured</p>
        <p className="text-sm text-center max-w-xs">
          Click <strong>⚙ Setup</strong> → paste your <code>builder-local</code> Maps API key → Save.
          The map will load automatically.
        </p>
      </div>
    )
  }

  // Key set but script still loading
  if (!mapsReady) {
    return (
      <div className="flex-1 flex items-center justify-center text-slate-400 gap-2">
        <span className="animate-spin text-lg">⟳</span>
        <p className="text-sm">Loading Google Maps…</p>
      </div>
    )
  }

  const dayEntryCount = planEntries.filter(e => e.day === activeDay && !e.deletedAt && e.lat && e.lng).length

  return (
    <div className="flex-1 relative overflow-hidden">
      <div ref={mapDivRef} className="w-full h-full" />

      {/* Location info popup */}
      {selectedLoc && (
        <div className="absolute top-4 right-4 z-10 bg-white rounded-xl shadow-xl border border-slate-200 p-3 w-64">
          <div className="flex items-start gap-2 mb-2">
            <img src={getCatIconUrl(selectedLoc.category)} className="w-5 h-5 shrink-0" style={{ filter: 'drop-shadow(0 1px 2px rgba(0,0,0,0.3))' }} alt="" />
            <p className="text-sm font-semibold text-slate-800 leading-tight flex-1">{selectedLoc.name}</p>
            <button onClick={() => setSelectedLoc(null)} className="text-slate-400 hover:text-slate-600 text-lg leading-none shrink-0">×</button>
          </div>
          <p className="text-xs text-slate-500 mb-1">{selectedLoc.category}</p>
          <p className="text-xs text-slate-400 font-mono mb-3">
            {selectedLoc.latitude?.toFixed(5)}, {selectedLoc.longitude?.toFixed(5)}
          </p>
          {selectedLoc.description && (
            <p className="text-xs text-slate-500 mb-3 line-clamp-2">{selectedLoc.description}</p>
          )}
          <div className="flex gap-2">
            <button
              onClick={() => { onOpenEditor(selectedLoc, false); setSelectedLoc(null) }}
              className="flex-1 py-1.5 text-xs font-semibold bg-sky-500 text-white rounded-lg hover:bg-sky-600 transition-colors"
            >
              ✎ Edit
            </button>
            <button
              onClick={() => { onRequestDayPicker(selectedLoc); setSelectedLoc(null) }}
              className="flex-1 py-1.5 text-xs font-semibold bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-colors"
            >
              📅 Add to Plan
            </button>
          </div>
        </div>
      )}

      {/* Stats bar */}
      <div className="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm rounded-lg px-3 py-1.5 text-xs text-slate-500 shadow-sm pointer-events-none">
        {locations.filter(l => l.latitude && l.longitude).length} locations
        {dayEntryCount > 0 && ` · ${dayEntryCount} Day ${activeDay} entries`}
      </div>
    </div>
  )
}

// ─── Maps Importer ────────────────────────────────────────────────────────────
function MapsImporter({ targetDay, onPreFillEntry, onPreFillLocation }) {
  const [url, setUrl]         = useState('')
  const [loading, setLoading] = useState(false)
  const [result, setResult]   = useState(null)
  const [error, setError]     = useState('')

  async function handleResolve() {
    const netlifyUrl = localStorage.getItem('builderNetlifyUrl') || ''
    if (!netlifyUrl) {
      setError('No Netlify resolver URL set. Click ⚙ Setup to configure.')
      return
    }
    if (!url.trim()) return
    setLoading(true); setError(''); setResult(null)
    try {
      const controller = new AbortController()
      const timeoutId = setTimeout(() => controller.abort(), 12000)
      let res
      try {
        res = await fetch(`${netlifyUrl}?url=${encodeURIComponent(url.trim())}`, { signal: controller.signal })
      } finally {
        clearTimeout(timeoutId)
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      const data = await res.json()
      if (data.error) throw new Error(data.error)

      if (data.needsGeocode && data.address) {
        if (!window.google?.maps?.Geocoder) throw new Error('Google Maps not loaded yet — wait a moment and try again')
        const geocoder = new window.google.maps.Geocoder()
        const geoResult = await geocoder.geocode({ address: data.address })
        if (geoResult.results?.[0]) {
          const loc = geoResult.results[0].geometry.location
          data.lat = loc.lat()
          data.lng = loc.lng()
          delete data.needsGeocode
        } else {
          throw new Error('Could not find coordinates for this place — try a full Google Maps link instead')
        }
      }

      if (!data.lat && !data.lng) throw new Error('No coordinates in response')
      setResult(data)
    } catch (err) {
      setError(err.name === 'AbortError' ? 'Request timed out — try again' : err.message)
    } finally {
      setLoading(false)
    }
  }

  function handleAdd() {
    if (!result) return
    const e = result.enriched
    onPreFillLocation({
      name:        result.name || '',
      latitude:    result.lat,
      longitude:   result.lng,
      category:    e?.suggestedCategory || 'location',
      description: e?.description || '',
      address:     e?.address || '',
      phone:        e?.phone || '',
      website:      e?.website || '',
      rating:       e?.rating || null,
      openingHours: e?.openingHours || null,
    })
    setResult(null); setUrl('')
  }

  return (
    <div className="space-y-3">
      <p className="text-xs text-slate-500">
        Paste any Google Maps URL (shortened or full) to extract coordinates and place details.
      </p>
      <textarea
        value={url}
        onChange={e => setUrl(e.target.value)}
        placeholder="https://maps.app.goo.gl/..."
        rows={3}
        className="w-full px-3 py-2 text-xs border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 resize-none font-mono"
      />
      <button
        onClick={handleResolve}
        disabled={loading || !url.trim()}
        className="w-full py-2 text-sm font-semibold bg-sky-500 text-white rounded-lg hover:bg-sky-600 disabled:opacity-50 transition-colors"
      >
        {loading ? '🔄 Resolving…' : '📍 Resolve Link'}
      </button>
      {error && (
        <p className="text-xs text-red-500 bg-red-50 border border-red-200 rounded-lg px-3 py-2">{error}</p>
      )}
      {result && (() => {
        const e = result.enriched
        return (
          <div className="rounded-xl border bg-sky-50 border-sky-200 overflow-hidden">
            {/* Header */}
            <div className="px-3 pt-3 pb-2 space-y-1">
              <p className="text-sm font-semibold text-sky-900">{result.name || 'Unnamed place'}</p>
              <p className="text-xs font-mono text-sky-500">{result.lat?.toFixed(6)}, {result.lng?.toFixed(6)}</p>
            </div>

            {/* Enriched data */}
            {e && (
              <div className="px-3 pb-2 space-y-1.5 border-t border-sky-100 pt-2">
                {e.address && (
                  <p className="text-xs text-slate-600 leading-snug">📍 {e.address}</p>
                )}
                {e.description && (
                  <p className="text-xs text-slate-600 italic leading-snug">"{e.description}"</p>
                )}
                <div className="flex flex-wrap gap-2">
                  {e.rating != null && (
                    <span className="text-xs bg-amber-100 text-amber-800 rounded px-1.5 py-0.5 font-medium">
                      ⭐ {e.rating}{e.ratingCount ? ` (${e.ratingCount.toLocaleString()})` : ''}
                    </span>
                  )}
                  {e.suggestedCategory && (
                    <span className="text-xs bg-indigo-100 text-indigo-800 rounded px-1.5 py-0.5 font-medium">
                      🏷 {e.suggestedCategory}
                    </span>
                  )}
                  {e.primaryType && (
                    <span className="text-xs bg-slate-100 text-slate-600 rounded px-1.5 py-0.5">
                      {e.primaryType.replace(/_/g, ' ')}
                    </span>
                  )}
                </div>
                {e.phone && (
                  <p className="text-xs text-slate-500">📞 {e.phone}</p>
                )}
                {e.website && (
                  <p className="text-xs text-slate-500 truncate">🌐 {e.website.replace(/^https?:\/\//, '')}</p>
                )}
                {e.openingHours && (
                  <details className="text-xs">
                    <summary className="text-slate-500 cursor-pointer select-none">🕐 Opening hours</summary>
                    <ul className="mt-1 space-y-0.5 pl-2">
                      {e.openingHours.map((h, i) => (
                        <li key={i} className="text-slate-500">{h}</li>
                      ))}
                    </ul>
                  </details>
                )}
              </div>
            )}

            <div className="px-3 pb-3 pt-2">
              <button
                onClick={handleAdd}
                className="w-full py-2 text-sm font-semibold bg-sky-500 text-white rounded-lg hover:bg-sky-600 transition-colors"
              >
                Add Location →
              </button>
            </div>
          </div>
        )
      })()}
    </div>
  )
}

// ─── PDF Digestor ─────────────────────────────────────────────────────────────
function PdfDigestor({ targetDay, onPreFillEntry }) {
  const [text, setText]       = useState('')
  const [loading, setLoading] = useState(false)
  const fileRef = useRef(null)

  async function handleFile(file) {
    if (!file || file.type !== 'application/pdf') return
    setLoading(true)
    try {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'
      const ab  = await file.arrayBuffer()
      const doc = await pdfjsLib.getDocument({ data: ab }).promise
      let out = ''
      for (let p = 1; p <= doc.numPages; p++) {
        const page    = await doc.getPage(p)
        const content = await page.getTextContent()
        out += content.items.map(i => i.str).join(' ') + '\n'
      }
      setText(out.trim())
    } catch (err) {
      setText(`Error extracting PDF text:\n${err.message}`)
    } finally {
      setLoading(false)
    }
  }

  function createEntry() {
    const t = text.slice(0, 800)
    const typeGuess =
      /hotel|check.in|check.out|room|property/i.test(t) ? 'hotel' :
      /flight|airline|depart|arrive|airport/i.test(t)   ? 'flight' :
      /train|shinkansen|jr/i.test(t)                    ? 'train'  : 'activity'
    const confMatch = t.match(/(?:confirmation|booking|reference|reservation)\s*(?:#|no\.?|number)?\s*:?\s*([A-Z0-9\-]{4,20})/i)
    onPreFillEntry({
      type:  typeGuess,
      name:  '',
      day:   targetDay,
      order: 99,
      owner: 'nirco',
      note:  t.slice(0, 300),
      meta:  confMatch ? { confirmationNumber: confMatch[1] } : {},
    })
  }

  return (
    <div className="space-y-3">
      <div
        className="border-2 border-dashed border-slate-300 rounded-xl p-4 text-center cursor-pointer hover:border-sky-400 hover:bg-sky-50 transition-colors"
        onClick={() => fileRef.current?.click()}
        onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = '#0ea5e9' }}
        onDragLeave={e => { e.currentTarget.style.borderColor = '' }}
        onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = ''; handleFile(e.dataTransfer.files[0]) }}
      >
        <input ref={fileRef} type="file" accept=".pdf" className="hidden" onChange={e => handleFile(e.target.files[0])} />
        <p className="text-sm text-slate-500">
          {loading ? '🔄 Extracting text…' : '📄 Drop PDF here or click to upload'}
        </p>
      </div>

      <button
        onClick={() => setText(SAMPLE_PDF_TEXT)}
        className="w-full py-1.5 text-xs text-slate-500 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors"
      >
        Load sample (hotel voucher)
      </button>

      {text && (
        <>
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            rows={9}
            className="w-full px-3 py-2 text-xs border border-slate-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-300 resize-none font-mono bg-slate-50"
          />
          <button
            onClick={createEntry}
            className="w-full py-2 text-sm font-semibold bg-sky-500 text-white rounded-lg hover:bg-sky-600 transition-colors"
          >
            → Auto-detect &amp; Open in Entry Editor
          </button>
        </>
      )}
    </div>
  )
}

// ─── Email Digestor ───────────────────────────────────────────────────────────
function EmailDigestor({ targetDay, onPreFillEntry }) {
  const [text, setText]         = useState('')
  const [detected, setDetected] = useState(null)

  function detect() {
    if (!text.trim()) return

    // Type detection
    const type =
      /flight|airline|depart|arrive|airport|\bly\d+\b/i.test(text)      ? 'flight'     :
      /hotel|check.in|check.out|room|property|accommodation/i.test(text) ? 'hotel'      :
      /train|shinkansen|jr pass|rail|station/i.test(text)                ? 'train'      :
      /car rental|vehicle|pick.?up|hertz|avis|budget/i.test(text)        ? 'car_rental' :
      'activity'

    // Confirmation number
    const confMatch = text.match(/(?:confirmation|booking|reference|reservation|order)\s*(?:#|no\.?|number)?\s*:?\s*([A-Z0-9\-]{4,20})/i)
    const conf = confMatch ? confMatch[1] : ''

    // Date
    const isoDate     = text.match(/\b(\d{4}-\d{2}-\d{2})\b/)
    const writtenDate = text.match(/\b((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2},?\s+\d{4})\b/i)
    const dateRaw     = isoDate?.[1] || writtenDate?.[1] || ''
    const dayNum      = dateRaw ? dateToDayNum(dateRaw) : null

    // Time
    const timeMatch = text.match(/\b(\d{1,2}:\d{2}(?:\s*[AP]M)?)\b/i)
    const time = timeMatch ? timeMatch[1] : ''

    // Name — look for property/hotel/flight name after keyword
    const nameMatch = text.match(/(?:property|hotel|airline|train|flight)\s*:?\s*([^\n]{3,60})/i)
    const name = nameMatch ? nameMatch[1].trim() : ''

    // Check-in / check-out
    const checkInMatch  = text.match(/check.?in\s+(?:date\s*)?:?\s*([^\n]{3,30})/i)
    const checkOutMatch = text.match(/check.?out\s+(?:date\s*)?:?\s*([^\n]{3,30})/i)

    // Build meta
    let meta = {}
    if (type === 'hotel') {
      meta = {
        confirmationNumber: conf,
        checkIn:  checkInMatch  ? checkInMatch[1].trim()  : '',
        checkOut: checkOutMatch ? checkOutMatch[1].trim() : '',
      }
    } else if (type === 'flight') {
      const routeMatch = text.match(/\b([A-Z]{3})\s*(?:→|->|to|-)\s*([A-Z]{3})\b/)
      meta = {
        confirmationNumber: conf,
        departureStation: routeMatch ? routeMatch[1] : '',
        arrivalStation:   routeMatch ? routeMatch[2] : '',
        departureTime:    dateRaw && time ? `${dateRaw.slice(0,10)}T${time.replace(/\s/g,'')}` : '',
      }
    } else {
      meta = {
        confirmationNumber: conf,
        time: dateRaw && time ? `${dateRaw.slice(0,10)}T${time}` : '',
      }
    }

    setDetected({ type, name, day: dayNum ?? targetDay, conf, dateRaw, time, meta })
  }

  function handleCreate() {
    if (!detected) return
    onPreFillEntry({
      type:  detected.type,
      name:  detected.name,
      day:   detected.day,
      order: 99,
      owner: 'nirco',
      note:  '',
      meta:  detected.meta,
    })
    setDetected(null)
    setText('')
  }

  return (
    <div className="space-y-3">
      <p className="text-xs text-slate-500">Paste raw email or booking confirmation text.</p>
      <button
        onClick={() => { setText(SAMPLE_EMAIL_TEXT); setDetected(null) }}
        className="w-full py-1.5 text-xs text-slate-500 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors"
      >
        Load sample (hotel email)
      </button>
      <textarea
        value={text}
        onChange={e => { setText(e.target.value); setDetected(null) }}
        placeholder="Paste email text here…"
        rows={8}
        className="w-full px-3 py-2 text-xs border border-slate-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-300 resize-none font-mono bg-slate-50"
      />
      <button
        onClick={detect}
        disabled={!text.trim()}
        className="w-full py-2 text-sm font-semibold bg-violet-500 text-white rounded-lg hover:bg-violet-600 disabled:opacity-50 transition-colors"
      >
        🔍 Detect Fields
      </button>

      {detected && (
        <div className="bg-violet-50 border border-violet-200 rounded-xl p-3 space-y-2.5">
          <p className="text-xs font-bold text-violet-600 uppercase tracking-wide">Detected</p>
          <div className="grid grid-cols-2 gap-x-3 gap-y-1.5 text-xs">
            <div className="flex items-center gap-1.5">
              <span className="text-slate-500">Type:</span>
              <TypePill type={detected.type} />
            </div>
            <div>
              <span className="text-slate-500">Day:</span>{' '}
              <span className="font-semibold">{detected.day}</span>
              <span className="text-slate-400"> — {formatDayLabel(detected.day)}</span>
            </div>
            {detected.conf && (
              <div className="col-span-2">
                <span className="text-slate-500">Confirmation:</span>{' '}
                <code className="font-semibold text-slate-700">{detected.conf}</code>
              </div>
            )}
            {detected.dateRaw && (
              <div>
                <span className="text-slate-500">Date:</span>{' '}
                <span className="font-semibold">{detected.dateRaw}</span>
              </div>
            )}
            {detected.time && (
              <div>
                <span className="text-slate-500">Time:</span>{' '}
                <span className="font-semibold">{detected.time}</span>
              </div>
            )}
            {detected.name && (
              <div className="col-span-2">
                <span className="text-slate-500">Name:</span>{' '}
                <span className="font-semibold">{detected.name}</span>
              </div>
            )}
          </div>
          <button
            onClick={handleCreate}
            className="w-full py-1.5 text-sm font-semibold bg-violet-500 text-white rounded-lg hover:bg-violet-600 transition-colors"
          >
            → Open in Entry Editor
          </button>
        </div>
      )}
    </div>
  )
}

// ─── Tools Panel ──────────────────────────────────────────────────────────────
function ToolsPanel({ targetDay, toolTab, onToolTabChange, onPreFillEntry, onPreFillLocation }) {
  return (
    <aside className="w-80 border-l border-slate-200 flex flex-col shrink-0 bg-slate-50 overflow-hidden">
      <div className="flex border-b border-slate-200 shrink-0">
        {[
          { id: 'maps',  label: '📍 Maps'  },
          { id: 'pdf',   label: '📄 PDF'   },
          { id: 'email', label: '✉️ Email' },
        ].map(tab => (
          <button
            key={tab.id}
            onClick={() => onToolTabChange(tab.id)}
            className={`flex-1 py-3 text-sm font-semibold transition-colors ${
              toolTab === tab.id
                ? 'text-sky-600 border-b-2 border-sky-500 bg-white'
                : 'text-slate-500 hover:text-slate-700'
            }`}
          >
            {tab.label}
          </button>
        ))}
      </div>
      <div className="flex-1 overflow-y-auto p-4">
        <p className="text-xs text-slate-400 mb-3 pb-2 border-b border-slate-100">
          Targeting Day {targetDay} — {formatDayLabel(targetDay)}
        </p>
        {toolTab === 'maps'  && <MapsImporter  targetDay={targetDay} onPreFillEntry={onPreFillEntry} onPreFillLocation={onPreFillLocation} />}
        {toolTab === 'pdf'   && <PdfDigestor   targetDay={targetDay} onPreFillEntry={onPreFillEntry} />}
        {toolTab === 'email' && <EmailDigestor targetDay={targetDay} onPreFillEntry={onPreFillEntry} />}
      </div>
    </aside>
  )
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [locations,   setLocations]   = useState([])
  const [planEntries, setPlanEntries] = useState([])
  const [dirty,       setDirty]       = useState(false)
  const [folderOpen,  setFolderOpen]  = useState(false)
  const [activeDay,   setActiveDay]   = useState(1)
  const [mainTab,     setMainTab]     = useState('plan')
  const [toolTab,     setToolTab]     = useState('maps')
  const [showSetup,   setShowSetup]   = useState(false)
  const [statusMsg,   setStatusMsg]   = useState('')
  const [preFillEntry,    setPreFillEntry]    = useState(null)
  const [locEditorModal,  setLocEditorModal]  = useState(null)
  const [dayPickerLoc,    setDayPickerLoc]    = useState(null)
  const [mapsReady,     setMapsReady]     = useState(false)
  const [mapHeightPct,  setMapHeightPct]  = useState(55)
  const [focusCoords,   setFocusCoords]   = useState(null)

  const locFileRef    = useRef(null)
  const planFileRef   = useRef(null)
  const dividerDragRef = useRef({ dragging: false, startY: 0, startPct: 55, containerH: 0 })
  const statusTimerRef = useRef(null)

  function status(msg, ms = 3000) {
    setStatusMsg(msg)
    if (statusTimerRef.current) clearTimeout(statusTimerRef.current)
    if (ms > 0) statusTimerRef.current = setTimeout(() => { setStatusMsg(''); statusTimerRef.current = null }, ms)
  }

  // ── Google Maps script loader ──────────────────────────────────────────────
  function loadMaps() {
    const key = localStorage.getItem('builderMapsKey') || ''
    if (!key) return
    if (window.google?.maps) { setMapsReady(true); return }
    if (document.querySelector('script[data-builder-maps]')) return  // already injected
    window.__builderMapsInit = () => setMapsReady(true)
    const s = document.createElement('script')
    s.setAttribute('data-builder-maps', '1')
    s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=__builderMapsInit`
    s.async = true
    s.onerror = () => status('❌ Maps failed to load — check API key in ⚙ Setup', 6000)
    document.head.appendChild(s)
  }

  // ── On mount: restore cache + load maps ───────────────────────────────────
  useEffect(() => {
    try {
      const locs = JSON.parse(localStorage.getItem('builderLocations')    || 'null')
      const plan = JSON.parse(localStorage.getItem('builderPlanEntries')  || 'null')
      if (locs || plan) {
        if (locs) setLocations(migrateLocations(locs))
        if (plan) setPlanEntries(plan)
        setFolderOpen(true)
      }
    } catch(e) {}
    loadMaps()
  }, [])

  // ── Auto-save to localStorage whenever data changes ────────────────────────
  useEffect(() => {
    if (!folderOpen) return
    try {
      localStorage.setItem('builderLocations',   JSON.stringify(locations))
      localStorage.setItem('builderPlanEntries', JSON.stringify(planEntries))
    } catch(e) { /* quota exceeded */ }
  }, [locations, planEntries, folderOpen])

  // ── Clear cache ────────────────────────────────────────────────────────────
  function handleClearCache() {
    if (!confirm('Clear all cached data and reset to empty state?')) return
    localStorage.removeItem('builderLocations')
    localStorage.removeItem('builderPlanEntries')
    setLocations([])
    setPlanEntries([])
    setFolderOpen(false)
    setDirty(false)
    setActiveDay(1)
    setMainTab('plan')
    status('Cache cleared — load files to begin', 3000)
  }

  function downloadJson(data, filename) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
    const url  = URL.createObjectURL(blob)
    const a    = document.createElement('a')
    a.href     = url
    a.download = filename
    document.body.appendChild(a)
    a.click()
    document.body.removeChild(a)
    URL.revokeObjectURL(url)
  }

  function handleOpenLocFile(e) {
    const file = e.target.files[0]
    if (!file) return
    const reader = new FileReader()
    reader.onload = ev => {
      try {
        const json = JSON.parse(ev.target.result)
        setLocations(migrateLocations(json.locations || []))
        setFolderOpen(true)
        setDirty(false)
        status(`✓ ${(json.locations||[]).length} locations loaded`, 3000)
      } catch (err) {
        status(`❌ locations.json parse error: ${err.message}`, 5000)
      }
    }
    reader.readAsText(file)
    e.target.value = ''
  }

  function handleOpenPlanFile(e) {
    const file = e.target.files[0]
    if (!file) return
    const reader = new FileReader()
    reader.onload = ev => {
      try {
        const text = ev.target.result
        if (text.trim()) {
          const json    = JSON.parse(text)
          const entries = (json.entries || [])
            .filter(e => e.id && typeof e.day === 'number' && e.day >= 1)
            .map(e => ({
              owner: 'shared', meta: null, type: 'location', deletedAt: null,
              ...e,
              updatedAt: e.updatedAt || e.createdAt || new Date().toISOString(),
            }))
          setPlanEntries(entries)
          const visible = entries.filter(e => !e.deletedAt).length
          status(`✓ ${visible} plan entries loaded`, 3000)
        }
        setFolderOpen(true)
        setDirty(false)
      } catch (err) {
        status(`❌ plan.json parse error: ${err.message}`, 5000)
      }
    }
    reader.readAsText(file)
    e.target.value = ''
  }

  // Push multiple files in a single atomic commit using the Git Trees API.
  // One commit → one workflow run (vs two commits → two runs with the Contents API).
  async function ghPushFiles(token, repo, branch, files, message) {
    const base = `https://api.github.com/repos/${repo}/git`
    const h = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' }

    // 1. Get the latest commit SHA on the branch
    const refRes = await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, { headers: h })
    if (!refRes.ok) throw new Error(`Get ref failed: ${refRes.status}`)
    const latestSha = (await refRes.json()).object.sha

    // 2. Get the tree SHA from that commit
    const commitRes = await fetch(`${base}/commits/${latestSha}`, { headers: h })
    if (!commitRes.ok) throw new Error(`Get commit failed: ${commitRes.status}`)
    const baseTree = (await commitRes.json()).tree.sha

    // 3. Create a new tree with all file changes
    const treeRes = await fetch(`${base}/trees`, {
      method: 'POST', headers: h,
      body: JSON.stringify({
        base_tree: baseTree,
        tree: files.map(({ path, content }) => ({ path, mode: '100644', type: 'blob', content })),
      }),
    })
    if (!treeRes.ok) throw new Error(`Create tree failed: ${treeRes.status}`)
    const newTreeSha = (await treeRes.json()).sha

    // 4. Create the commit
    const newCommitRes = await fetch(`${base}/commits`, {
      method: 'POST', headers: h,
      body: JSON.stringify({ message, tree: newTreeSha, parents: [latestSha] }),
    })
    if (!newCommitRes.ok) throw new Error(`Create commit failed: ${newCommitRes.status}`)
    const newCommitSha = (await newCommitRes.json()).sha

    // 5. Update the branch to point to the new commit
    const updateRes = await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
      method: 'PATCH', headers: h,
      body: JSON.stringify({ sha: newCommitSha }),
    })
    if (!updateRes.ok) { const e = await updateRes.json(); throw new Error(e.message || `Update ref failed: ${updateRes.status}`) }
  }

  async function handleSaveFiles() {
    if (locations.length === 0 && planEntries.length === 0) {
      status('❌ No data loaded — open a file first', 3000)
      return
    }

    const locsJson = JSON.stringify({
      version: '1.0.0',
      updated_at: new Date().toISOString(),
      categories: [...new Set(locations.map(l => l.category).filter(Boolean))],
      locations,
    }, null, 2)
    const planJson = JSON.stringify({ version: '2.0.0', entries: planEntries }, null, 2)

    const token    = localStorage.getItem('builderGhToken')  || ''
    const repo     = localStorage.getItem('builderGhRepo')   || ''
    const branch   = localStorage.getItem('builderGhBranch') || 'main'
    const syncRepo = localStorage.getItem('builderSyncRepo') || ''

    if (token && repo) {
      status('⏳ Pushing to GitHub…', 0)
      try {
        const msg = `Update trip data — ${new Date().toLocaleString()}`
        await ghPushFiles(token, repo, branch, [
          { path: 'public/data/locations.json', content: locsJson },
          { path: 'public/data/plan.json',      content: planJson },
        ], msg)
        setDirty(false)

        // Also push plan.json to the mobile sync repo (trip-data) so mobile sync picks it up
        if (syncRepo) {
          try {
            // Stamp active entries with the push time so builder always wins over
            // stale mobile tombstones (LWW: builder push time > any past mobile deletion).
            // Tombstones keep their original timestamps so deletions still propagate.
            const pushTime = new Date().toISOString()
            const syncPayload = JSON.stringify({
              version: '3.0.0',
              syncedAt: pushTime,
              entries: planEntries.map(e => e.deletedAt ? e : { ...e, updatedAt: pushTime }),
            }, null, 2)
            await ghPushFiles(token, syncRepo, 'main', [
              { path: 'plan.json', content: syncPayload },
            ], msg)
            status('✅ Pushed to GitHub + sync repo — deploy will start automatically', 5000)
          } catch (syncErr) {
            status(`✅ Main push OK — sync repo push failed: ${syncErr.message}`, 8000)
          }
        } else {
          status('✅ Pushed to GitHub — deploy will start automatically', 5000)
        }
      } catch (err) {
        status(`❌ GitHub push failed: ${err.message}`, 8000)
      }
    } else {
      // Fallback: download files locally
      downloadJson(JSON.parse(locsJson), 'locations.json')
      downloadJson(JSON.parse(planJson), 'plan.json')
      setDirty(false)
      status('✅ Downloaded — copy files to public/data/ and push to git', 5000)
    }
  }

  function handleFocusEntry(entry) {
    const locId = entry.locationId || null
    if (entry.lat && entry.lng) {
      setFocusCoords({ lat: entry.lat, lng: entry.lng, locationId: locId })
      return
    }
    if (locId) {
      const loc = locations.find(l => l.id === locId)
      if (loc?.latitude && loc?.longitude)
        setFocusCoords({ lat: loc.latitude, lng: loc.longitude, locationId: loc.id })
    }
  }

  function handleAddLocToDay(loc, day) {
    const now = new Date().toISOString()
    const existing = planEntries.filter(e => e.day === day && !e.deletedAt)
    const newEntry = {
      id: genPlanId(),
      day,
      order: existing.length,
      type: 'location',
      locationId: loc.id,
      name: loc.name,
      lat: loc.latitude ?? null,
      lng: loc.longitude ?? null,
      note: null,
      owner: 'shared',
      meta: null,
      createdAt: now,
      updatedAt: now,
      deletedAt: null,
    }
    setPlanEntries(prev => [...prev, newEntry])
    setDirty(true)
    setActiveDay(day)
    setMainTab('plan')
    status(`✅ "${loc.name}" added to Day ${day}`, 2500)
  }

  function handleDeleteLocation(id) {
    const linked = planEntries.filter(e => e.locationId === id)
    setLocations(prev => prev.filter(l => l.id !== id))
    if (linked.length > 0) {
      setPlanEntries(prev => prev.filter(e => e.locationId !== id))
      status(`Location deleted · ${linked.length} plan entr${linked.length === 1 ? 'y' : 'ies'} also removed`, 3000)
    }
    setDirty(true)
  }

  function handlePreFillEntry(partial) {
    const day = partial.day ?? activeDay
    if (day !== activeDay) setActiveDay(day)
    setMainTab('plan')
    setPreFillEntry(partial)
  }

  function handlePreFillLocation(partial) {
    setLocEditorModal({ location: partial, isNew: true })
  }

  function handleLocEditorSave(saved) {
    const isNew = locEditorModal?.isNew
    if (isNew) {
      let id = saved.id
      let counter = 2
      while (locations.some(l => l.id === id)) {
        id = `${saved.id.slice(0, 56)}-${counter++}`
      }
      if (id !== saved.id) saved = { ...saved, id }
      setLocations([...locations, saved])
      status('Location added ✓')
    } else {
      setLocations(locations.map(l => l.id === saved.id ? saved : l))
      status('Location saved ✓')
    }
    setDirty(true)
    setLocEditorModal(null)
  }

  function handleAddBoth(locData, day) {
    const { name, latitude, longitude, category, description } = locData
    const now = new Date().toISOString()
    const locId = genLocId(name, latitude || 0, longitude || 0)
    const loc = {
      ...locData,
      id: locId, name: name || 'Unnamed', latitude, longitude,
      category: category || 'location', description: description || '', images: [], icon: '',
      source: 'builder', created_at: now,
    }
    setLocations(prev => [...prev, loc])
    const existing = planEntries.filter(e => e.day === day && !e.deletedAt)
    const entry = {
      id: genPlanId(),
      day, order: existing.length, type: 'location',
      locationId: locId, name: loc.name,
      lat: latitude ?? null, lng: longitude ?? null,
      note: null, owner: 'shared', meta: null,
      createdAt: now, updatedAt: now, deletedAt: null,
    }
    setPlanEntries(prev => [...prev, entry])
    setDirty(true)
    setActiveDay(day)
    setMainTab('plan')
    status(`✅ "${loc.name}" added to Day ${day} + Locations`, 2500)
  }

  return (
    <div className="flex flex-col h-screen overflow-hidden">
      {/* Hidden file inputs — triggered by header buttons */}
      <input ref={locFileRef}  type="file" accept=".json" className="hidden" onChange={handleOpenLocFile} />
      <input ref={planFileRef} type="file" accept=".json" className="hidden" onChange={handleOpenPlanFile} />

      <Header
        dirty={dirty}
        onOpenLocFile={() => locFileRef.current?.click()}
        onOpenPlanFile={() => planFileRef.current?.click()}
        onSaveFiles={handleSaveFiles}
        onClearCache={handleClearCache}
        onSetup={() => setShowSetup(true)}
        statusMsg={statusMsg}
      />

      <div className="flex flex-1 overflow-hidden">
        {/* Left sidebar */}
        <DaysSidebar
          mainTab={mainTab}
          activeDay={activeDay}
          planEntries={planEntries}
          locCount={locations.length}
          onDaySelect={day => { setActiveDay(day); setMainTab('plan') }}
          onTabChange={setMainTab}
        />

        {/* Center — map always on top, plan/locations panel below */}
        <main className="flex-1 flex flex-col overflow-hidden bg-white">
          {/* Map — always visible */}
          <div style={{ height: mapHeightPct + '%', minHeight: 120 }} className="relative shrink-0 overflow-hidden flex flex-col">
            {!folderOpen ? (
              <div className="w-full h-full flex flex-col items-center justify-center gap-5 text-slate-400 px-8">
                <span className="text-5xl">📂</span>
                <p className="text-base font-semibold text-slate-600">Load your data files to begin</p>
                <p className="text-sm text-center max-w-sm">
                  Open <code>public/data/locations.json</code> and/or <code>public/data/plan.json</code> from
                  your project folder. After editing, click <strong>Save</strong> to download updated files,
                  then copy them back to <code>public/data/</code>.
                </p>
                <div className="flex gap-3">
                  <button
                    onClick={() => locFileRef.current?.click()}
                    className="px-5 py-2.5 bg-sky-500 text-white font-semibold rounded-xl hover:bg-sky-600 transition-colors"
                  >
                    📍 Open locations.json
                  </button>
                  <button
                    onClick={() => planFileRef.current?.click()}
                    className="px-5 py-2.5 bg-violet-500 text-white font-semibold rounded-xl hover:bg-violet-600 transition-colors"
                  >
                    📅 Open plan.json
                  </button>
                </div>
              </div>
            ) : (
              <MapView
                locations={locations}
                planEntries={planEntries}
                activeDay={activeDay}
                mapsReady={mapsReady}
                focusCoords={focusCoords}
                onRequestDayPicker={setDayPickerLoc}
                onOpenEditor={(loc, isNew) => setLocEditorModal({ location: loc, isNew })}
              />
            )}
          </div>

          {/* Draggable divider */}
          <div
            className="h-2 bg-slate-100 border-y border-slate-200 flex items-center justify-center cursor-row-resize shrink-0 hover:bg-slate-200 transition-colors select-none"
            onMouseDown={e => {
              const container = e.currentTarget.parentElement
              dividerDragRef.current = { dragging: true, startY: e.clientY, startPct: mapHeightPct, containerH: container.getBoundingClientRect().height }
              const onMove = ev => {
                if (!dividerDragRef.current.dragging) return
                const { startY, startPct, containerH } = dividerDragRef.current
                const deltaPct = ((ev.clientY - startY) / containerH) * 100
                setMapHeightPct(Math.min(85, Math.max(15, startPct + deltaPct)))
              }
              const onUp = () => {
                dividerDragRef.current.dragging = false
                document.removeEventListener('mousemove', onMove)
                document.removeEventListener('mouseup', onUp)
              }
              document.addEventListener('mousemove', onMove)
              document.addEventListener('mouseup', onUp)
            }}
          >
            <div className="w-8 h-1 bg-slate-300 rounded-full" />
          </div>

          {/* Bottom panel — plan entries or locations list */}
          <div className="flex-1 flex flex-col overflow-hidden min-h-0">
            {mainTab === 'plan' ? (
              <DayEditor
                key={activeDay}
                day={activeDay}
                planEntries={planEntries}
                preFillEntry={preFillEntry}
                onClearPreFill={() => setPreFillEntry(null)}
                onUpdateEntries={setPlanEntries}
                onSetDirty={() => setDirty(true)}
                onFocusEntry={handleFocusEntry}
              />
            ) : (
              <LocationsList
                locations={locations}
                onRequestDayPicker={setDayPickerLoc}
                onFocusLoc={setFocusCoords}
                onOpenEditor={(loc, isNew) => setLocEditorModal({ location: loc, isNew })}
              />
            )}
          </div>
        </main>

        {/* Right tools */}
        <ToolsPanel
          targetDay={activeDay}
          toolTab={toolTab}
          onToolTabChange={setToolTab}
          onPreFillEntry={handlePreFillEntry}
          onPreFillLocation={handlePreFillLocation}
        />
      </div>

      {showSetup && <SetupModal onClose={() => setShowSetup(false)} onAfterSave={loadMaps} />}

      {/* Location editor — floating overlay for all add/edit actions */}
      {locEditorModal && (
        <div
          className="fixed inset-0 z-50 flex items-end justify-center bg-black/40 backdrop-blur-sm"
          onClick={() => setLocEditorModal(null)}
        >
          <div
            className="bg-white rounded-t-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] overflow-y-auto p-4"
            onClick={e => e.stopPropagation()}
          >
            <LocationEditPanel
              location={locEditorModal.location}
              isNew={locEditorModal.isNew}
              onSave={handleLocEditorSave}
              onCancel={() => setLocEditorModal(null)}
              onDelete={locEditorModal.isNew ? () => {} : () => { handleDeleteLocation(locEditorModal.location.id); setLocEditorModal(null) }}
              onAddBoth={locEditorModal.isNew ? (data, day) => { handleAddBoth(data, day); setLocEditorModal(null) } : undefined}
            />
          </div>
        </div>
      )}

      {/* Day picker — rendered at root so fixed positioning is never trapped */}
      {dayPickerLoc && (
        <DayPickerModal
          loc={dayPickerLoc}
          planEntries={planEntries}
          onSelect={day => { handleAddLocToDay(dayPickerLoc, day); setDayPickerLoc(null) }}
          onClose={() => setDayPickerLoc(null)}
        />
      )}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
