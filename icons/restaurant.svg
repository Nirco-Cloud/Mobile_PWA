  <line x1="16" y1="11" x2="16" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="18" y1="11" x2="18" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
